<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>VLA4Desk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #eee; font-family: monospace; padding: 16px; }
  h1 { font-size: 1.2rem; margin-bottom: 12px; color: #adf; }
  .cameras { display: flex; gap: 12px; margin-bottom: 12px; }
  .cam-box { flex: 1; }
  .cam-box label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px; }
  .cam-box img { width: 100%; border: 1px solid #444; background: #000; display: block; }
  .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  button {
    padding: 8px 18px; border: none; border-radius: 4px;
    font-size: 0.9rem; cursor: pointer; font-family: monospace;
  }
  #btn-start  { background: #2a7a2a; color: #fff; }
  #btn-stop   { background: #7a2a2a; color: #fff; }
  #btn-home   { background: #2a4a7a; color: #fff; }
  #btn-record { background: #7a6a2a; color: #fff; }
  #btn-stop-record { background: #555; color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }
  .prompt-row { display: flex; gap: 8px; margin-bottom: 12px; }
  #prompt-input {
    flex: 1; padding: 8px; background: #2a2a2a; border: 1px solid #555;
    color: #eee; font-family: monospace; font-size: 0.9rem; border-radius: 4px;
  }
  #btn-send-prompt { background: #444; color: #eee; }
  .status-bar {
    font-size: 0.8rem; color: #888; padding: 6px 0;
    border-top: 1px solid #333;
  }
  #state-badge {
    display: inline-block; padding: 2px 10px; border-radius: 3px;
    font-weight: bold; font-size: 0.85rem; margin-left: 8px;
  }
  .state-idle    { background: #333; color: #aaa; }
  .state-running { background: #1a4a1a; color: #4f4; }
  .state-homing  { background: #1a2a4a; color: #48f; }
  #rec-indicator {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #555; margin-left: 12px;
    vertical-align: middle;
  }
  #rec-indicator.active { background: #f44; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<h1>VLA4Desk</h1>

<div class="cameras">
  <div class="cam-box">
    <label>外部相机 (cam1)</label>
    <img id="img1" alt="cam1">
  </div>
  <div class="cam-box">
    <label>腕部相机 (cam2)</label>
    <img id="img2" alt="cam2">
  </div>
</div>

<div class="prompt-row">
  <input id="prompt-input" type="text" placeholder="输入语言指令..." value="pick up the object">
  <button id="btn-send-prompt" onclick="sendPrompt()">发送指令</button>
</div>

<div class="controls">
  <button id="btn-start"       onclick="cmd('start')">推理</button>
  <button id="btn-stop"        onclick="cmd('stop')">停止</button>
  <button id="btn-home"        onclick="cmd('home')">复位</button>
  <button id="btn-record"      onclick="startRecord()">录屏</button>
  <button id="btn-stop-record" onclick="stopRecord()" disabled>停止录屏</button>
</div>

<div class="status-bar">
  状态：<span id="state-badge" class="state-idle">idle</span>
  <span id="rec-indicator" title="录屏中"></span>
</div>

<script>
const img1 = document.getElementById('img1');
const img2 = document.getElementById('img2');
const stateBadge = document.getElementById('state-badge');
const recIndicator = document.getElementById('rec-indicator');

// --- WebSocket 图像流 ---
const ws = new WebSocket(`ws://${location.host}/ws/frames`);
ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  img1.src = 'data:image/jpeg;base64,' + data.img1;
  img2.src = 'data:image/jpeg;base64,' + data.img2;
};
ws.onclose = () => console.warn('WS closed');

// --- 控制指令 ---
async function cmd(action) {
  await fetch(`/cmd/${action}`, { method: 'POST' });
  pollStatus();
}

async function sendPrompt() {
  const prompt = document.getElementById('prompt-input').value;
  await fetch('/cmd/prompt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });
}

async function startRecord() {
  await fetch('/cmd/record/start', { method: 'POST' });
  document.getElementById('btn-record').disabled = true;
  document.getElementById('btn-stop-record').disabled = false;
  recIndicator.classList.add('active');
}

async function stopRecord() {
  const res = await fetch('/cmd/record/stop', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({}),
  });
  const data = await res.json();
  alert(`录屏已保存：\ncam1: ${data.saved_to?.cam1}\ncam2: ${data.saved_to?.cam2}`);
  document.getElementById('btn-record').disabled = false;
  document.getElementById('btn-stop-record').disabled = true;
  recIndicator.classList.remove('active');
}

// --- 状态轮询 ---
function updateBadge(state) {
  stateBadge.textContent = state;
  stateBadge.className = `state-${state}`;
}

async function pollStatus() {
  const res = await fetch('/status');
  const data = await res.json();
  updateBadge(data.state);
  if (data.recording) {
    recIndicator.classList.add('active');
  } else {
    recIndicator.classList.remove('active');
  }
}

setInterval(pollStatus, 1000);
pollStatus();
</script>
</body>
</html>
