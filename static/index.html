<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>VLA4Desk</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #eee; font-family: monospace; padding: 16px; }
  h1 { font-size: 1.2rem; margin-bottom: 12px; color: #adf; }
  .cameras { display: flex; gap: 12px; margin-bottom: 12px; }
  .cam-box { flex: 1; }
  .cam-box label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px; }
  .cam-box img { width: 100%; border: 1px solid #444; background: #000; display: block; }
  .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  button {
    padding: 8px 18px; border: none; border-radius: 4px;
    font-size: 0.9rem; cursor: pointer; font-family: monospace;
  }
  #btn-start  { background: #2a7a2a; color: #fff; }
  #btn-stop   { background: #7a2a2a; color: #fff; }
  #btn-home   { background: #2a4a7a; color: #fff; }
  #btn-record { background: #7a6a2a; color: #fff; }
  #btn-stop-record { background: #555; color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }
  .prompt-row { display: flex; gap: 8px; margin-bottom: 12px; }
  #prompt-input {
    flex: 1; padding: 8px; background: #2a2a2a; border: 1px solid #555;
    color: #eee; font-family: monospace; font-size: 0.9rem; border-radius: 4px;
  }
  #btn-send-prompt { background: #444; color: #eee; }
  .status-bar {
    font-size: 0.8rem; color: #888; padding: 6px 0;
    border-top: 1px solid #333;
  }
  #state-badge {
    display: inline-block; padding: 2px 10px; border-radius: 3px;
    font-weight: bold; font-size: 0.85rem; margin-left: 8px;
  }
  .state-idle    { background: #333; color: #aaa; }
  .state-running { background: #1a4a1a; color: #4f4; }
  .state-homing  { background: #1a2a4a; color: #48f; }
  #rec-indicator {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #555; margin-left: 12px;
    vertical-align: middle;
  }
  #rec-indicator.active { background: #f44; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
  .conn-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #555; margin-left: 6px;
    vertical-align: middle;
  }
  .conn-dot.on { background: #4f4; }
  .conn-label { font-size: 0.75rem; color: #888; margin-left: 12px; }
  .telemetry {
    display: flex; gap: 12px; margin-top: 10px;
    font-size: 0.75rem; color: #888;
  }
  .tele-box {
    flex: 1; background: #222; border: 1px solid #333;
    border-radius: 4px; padding: 6px 8px;
  }
  .tele-box label { color: #666; display: block; margin-bottom: 4px; }
  .tele-row { display: flex; justify-content: space-between; }
  .tele-key { color: #666; }
  .tele-val { color: #cde; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<h1>VLA4Desk</h1>

<div class="cameras">
  <div class="cam-box">
    <label>外部相机 (cam1)</label>
    <img id="img1" alt="cam1">
  </div>
  <div class="cam-box">
    <label>腕部相机 (cam2)</label>
    <img id="img2" alt="cam2">
  </div>
</div>

<div class="prompt-row">
  <input id="prompt-input" type="text" placeholder="输入语言指令..." value="pick up the object">
  <button id="btn-send-prompt" onclick="sendPrompt()">发送指令</button>
</div>

<div class="controls">
  <button id="btn-start"       onclick="cmd('start')">推理</button>
  <button id="btn-stop"        onclick="cmd('stop')">停止</button>
  <button id="btn-home"        onclick="cmd('home')">复位</button>
  <button id="btn-record"      onclick="startRecord()">录屏</button>
  <button id="btn-stop-record" onclick="stopRecord()" disabled>停止录屏</button>
</div>

<div class="status-bar">
  状态：<span id="state-badge" class="state-idle">idle</span>
  <span id="rec-indicator" title="录屏中"></span>
  <span class="conn-label">机械臂<span id="dot-robot" class="conn-dot" title="机械臂"></span></span>
  <span class="conn-label">推理服务<span id="dot-server" class="conn-dot" title="推理服务"></span></span>
</div>

<div class="telemetry">
  <div class="tele-box" id="tele-state-box" style="display:none">
    <label>State（机械臂）</label>
    <div class="tele-row"><span class="tele-key">pos xyz</span><span class="tele-val" id="tele-pos">—</span></div>
    <div class="tele-row"><span class="tele-key">rot axisangle</span><span class="tele-val" id="tele-rot">—</span></div>
    <div class="tele-row"><span class="tele-key">gripper</span><span class="tele-val" id="tele-grip">—</span></div>
  </div>
  <div class="tele-box" id="tele-action-box" style="display:none">
    <label>Action（上一步）</label>
    <div class="tele-row"><span class="tele-key">Δpos xyz</span><span class="tele-val" id="tele-apos">—</span></div>
    <div class="tele-row"><span class="tele-key">Δrot axisangle</span><span class="tele-val" id="tele-arot">—</span></div>
    <div class="tele-row"><span class="tele-key">gripper</span><span class="tele-val" id="tele-agrip">—</span></div>
    <div class="tele-row"><span class="tele-key">推理耗时</span><span class="tele-val" id="tele-infer-ms">—</span></div>
    <div class="tele-row"><span class="tele-key">总耗时</span><span class="tele-val" id="tele-total-ms">—</span></div>
  </div>
</div>

<script>
const img1 = document.getElementById('img1');
const img2 = document.getElementById('img2');
const stateBadge = document.getElementById('state-badge');
const recIndicator = document.getElementById('rec-indicator');
const dotRobot = document.getElementById('dot-robot');
const dotServer = document.getElementById('dot-server');

// --- WebSocket 图像流 ---
const ws = new WebSocket(`ws://${location.host}/ws/frames`);
ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  img1.src = 'data:image/jpeg;base64,' + data.img1;
  img2.src = 'data:image/jpeg;base64,' + data.img2;
};
ws.onclose = () => console.warn('WS closed');

// --- 控制指令 ---
async function cmd(action) {
  await fetch(`/cmd/${action}`, { method: 'POST' });
  pollStatus();
}

async function sendPrompt() {
  const prompt = document.getElementById('prompt-input').value;
  await fetch('/cmd/prompt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });
}

async function startRecord() {
  await fetch('/cmd/record/start', { method: 'POST' });
  document.getElementById('btn-record').disabled = true;
  document.getElementById('btn-stop-record').disabled = false;
  recIndicator.classList.add('active');
}

async function stopRecord() {
  const res = await fetch('/cmd/record/stop', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({}),
  });
  const data = await res.json();
  alert(`录屏已保存：\ncam1: ${data.saved_to?.cam1}\ncam2: ${data.saved_to?.cam2}`);
  document.getElementById('btn-record').disabled = false;
  document.getElementById('btn-stop-record').disabled = true;
  recIndicator.classList.remove('active');
}

// --- 状态轮询 ---
function updateBadge(state) {
  stateBadge.textContent = state;
  stateBadge.className = `state-${state}`;
}

async function pollStatus() {
  const res = await fetch('/status');
  const data = await res.json();
  updateBadge(data.state);
  if (data.recording) {
    recIndicator.classList.add('active');
  } else {
    recIndicator.classList.remove('active');
  }
  dotRobot.classList.toggle('on', !!data.robot_connected);
  dotServer.classList.toggle('on', !!data.server_connected);

  const stateBox = document.getElementById('tele-state-box');
  const actionBox = document.getElementById('tele-action-box');
  stateBox.style.display = data.robot_connected ? '' : 'none';
  actionBox.style.display = data.server_connected ? '' : 'none';

  const fmt = (v) => v.toFixed(4);
  const fmtArr = (arr) => arr.map(fmt).join('  ');

  if (data.robot_connected && data.latest_state) {
    const s = data.latest_state;
    document.getElementById('tele-pos').textContent  = fmtArr(s.slice(0,3));
    document.getElementById('tele-rot').textContent  = fmtArr(s.slice(3,6));
    document.getElementById('tele-grip').textContent = fmt(s[6]);
  }
  if (data.server_connected && data.latest_action) {
    const a = data.latest_action;
    document.getElementById('tele-apos').textContent  = fmtArr(a.slice(0,3));
    document.getElementById('tele-arot').textContent  = fmtArr(a.slice(3,6));
    document.getElementById('tele-agrip').textContent = fmt(a[6]);
  }
  if (data.infer_ms != null) {
    document.getElementById('tele-infer-ms').textContent = data.infer_ms.toFixed(1) + ' ms';
  }
  if (data.prev_total_ms != null) {
    document.getElementById('tele-total-ms').textContent = data.prev_total_ms.toFixed(1) + ' ms';
  }
}

setInterval(pollStatus, 333);
pollStatus();
</script>
</body>
</html>
